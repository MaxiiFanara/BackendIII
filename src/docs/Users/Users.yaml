paths:
  /api/users:
    get:
      summary: Obtiene todos los usuarios
      description: Retorna el listado completo de usuarios registrados en la base de datos.
      tags:
        - Users
      responses:
        "200":
          description: Lista de usuarios obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Crea un nuevo usuario
      description: >
        Registra un nuevo usuario en la plataforma. La contraseña se almacena
        hasheada con bcrypt. El email debe ser único en el sistema.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/requestBodies/UserCreate"
      responses:
        "201":
          description: Usuario creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    $ref: "#/components/schemas/User"
        "400":
          description: Faltan campos obligatorios o el email ya está registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                camposFaltantes:
                  summary: Campos incompletos
                  value:
                    status: error
                    message: Todos los campos son obligatorios
                emailDuplicado:
                  summary: Email ya registrado
                  value:
                    status: error
                    message: El email ya se encuentra registrado
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/{uid}:
    get:
      summary: Obtiene un usuario por su ID
      description: Busca y retorna un usuario específico a partir de su MongoDB ObjectId.
      tags:
        - Users
      parameters:
        - name: uid
          in: path
          required: true
          description: ID del usuario (MongoDB ObjectId)
          schema:
            type: string
            example: 64a1b2c3d4e5f6789012345a
      responses:
        "200":
          description: Usuario encontrado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    $ref: "#/components/schemas/User"
        "400":
          description: El formato del ID proporcionado no es un ObjectId válido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: "Formato de ID inválido para el parámetro: uid"
        "404":
          description: No existe un usuario con el ID proporcionado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Usuario no encontrado
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Actualiza un usuario por su ID
      description: >
        Actualiza los datos de un usuario existente. Solo se modifican los campos
        enviados en el body. Si se envía password, será hasheada antes de guardarse.
      tags:
        - Users
      parameters:
        - name: uid
          in: path
          required: true
          description: ID del usuario (MongoDB ObjectId)
          schema:
            type: string
            example: 64a1b2c3d4e5f6789012345a
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/requestBodies/UserUpdate"
      responses:
        "200":
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    $ref: "#/components/schemas/User"
        "400":
          description: El formato del ID proporcionado no es un ObjectId válido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: "Formato de ID inválido para el parámetro: uid"
        "404":
          description: No existe un usuario con el ID proporcionado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Usuario no encontrado
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Elimina un usuario por su ID
      description: Elimina de forma permanente el usuario con el ID especificado.
      tags:
        - Users
      parameters:
        - name: uid
          in: path
          required: true
          description: ID del usuario (MongoDB ObjectId)
          schema:
            type: string
            example: 64a1b2c3d4e5f6789012345a
      responses:
        "200":
          description: Usuario eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Usuario eliminado correctamente
        "400":
          description: El formato del ID proporcionado no es un ObjectId válido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: "Formato de ID inválido para el parámetro: uid"
        "404":
          description: No existe un usuario con el ID proporcionado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Usuario no encontrado
        "500":
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    User:
      type: object
      description: Representa un usuario registrado en la plataforma.
      properties:
        _id:
          type: string
          description: ID autogenerado por MongoDB
          example: 64a1b2c3d4e5f6789012345a
        first_name:
          type: string
          description: Nombre del usuario
          example: Juan
        last_name:
          type: string
          description: Apellido del usuario
          example: Pérez
        email:
          type: string
          description: Correo del usuario, este campo es único
          example: juan@example.com
        age:
          type: number
          description: Edad del usuario
          example: 30
        role:
          type: string
          description: Rol del usuario en la plataforma
          enum:
            - user
            - admin
          example: user
        pets:
          type: array
          description: IDs de las mascotas adoptadas por el usuario
          items:
            type: string
          example: []
        createdAt:
          type: string
          format: date-time
          description: Fecha de creación del registro
        updatedAt:
          type: string
          format: date-time
          description: Fecha de última actualización del registro
      example:
        _id: 64a1b2c3d4e5f6789012345a
        first_name: Juan
        last_name: Pérez
        email: juan@example.com
        age: 30
        role: user
        pets: []

    ErrorResponse:
      type: object
      description: Estructura estándar de respuesta de error.
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Descripción del error ocurrido
      example:
        status: error
        message: Descripción del error ocurrido

  requestBodies:
    UserCreate:
      type: object
      required:
        - first_name
        - last_name
        - email
        - age
        - password
      description: Datos necesarios para registrar un nuevo usuario.
      properties:
        first_name:
          type: string
          description: Nombre del usuario
          example: Juan
        last_name:
          type: string
          description: Apellido del usuario
          example: Pérez
        email:
          type: string
          description: Correo electrónico único del usuario
          example: juan@example.com
        age:
          type: number
          description: Edad del usuario
          example: 30
        password:
          type: string
          description: Contraseña del usuario, será hasheada con bcrypt antes de guardarse
          example: secret123
        role:
          type: string
          description: Rol del usuario (opcional, por defecto "user")
          enum:
            - user
            - admin
          example: user
      example:
        first_name: Juan
        last_name: Pérez
        email: juan@example.com
        age: 30
        password: secret123
        role: user

    UserUpdate:
      type: object
      description: Datos para actualizar un usuario. Todos los campos son opcionales.
      properties:
        first_name:
          type: string
          description: Nombre del usuario
          example: Juan
        last_name:
          type: string
          description: Apellido del usuario
          example: Pérez
        age:
          type: number
          description: Edad del usuario
          example: 31
        password:
          type: string
          description: Nueva contraseña, será hasheada con bcrypt antes de guardarse
          example: newpassword123
      example:
        first_name: Juan
        last_name: Pérez
        age: 31
        password: newpassword123
